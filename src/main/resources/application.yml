spring:
  datasource:
    url: jdbc:mysql://localhost:13306/item_db?currentSchema=item
    username: itemuser
    password: itempassword
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        check_nullability: true
        default_schema: item
      org:
        hibernate:
          envers:
            audit_table_suffix: _aud
            revision_field_name: revision_id
            revision_type_field_name: revision_type
    open-in-view: false
    hibernate:
      ddl-auto: validate

  liquibase:
    default-schema: item
    enabled: true
    change-log: classpath:/db/changelog/changelog-master.yaml

server:
  port: 8000

logging:
  level:
    web: debug

application:
  jwt:
    secret-key: MzE5d0FzN0ZQcDJyOUlYZnlpU2R5V0FLQXhGNWRtMHc
    expiration-ms: 3600000